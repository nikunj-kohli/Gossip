<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset OTP</title>
  </head>
  <body style="margin: 0; padding: 0; background: #f6f8fb; font-family: Arial, sans-serif; color: #1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding: 24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 560px; background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden;">
            <tr>
              <td style="padding: 24px;">
                <h2 style="margin: 0 0 12px 0; font-size: 22px; color: #111827;">Password Reset Request</h2>
                <p style="margin: 0 0 16px 0; line-height: 1.5; color: #4b5563;">
                  Hi {{displayName}}, use this OTP to reset your {{appName}} password.
                </p>

                <div style="margin: 18px 0; text-align: center;">
                  <span style="display: inline-block; letter-spacing: 6px; font-size: 28px; font-weight: 700; color: #0f766e; background: #ecfeff; border: 1px dashed #14b8a6; border-radius: 10px; padding: 12px 18px;">
                    {{otp}}
                  </span>
                </div>

                <p style="margin: 0 0 8px 0; line-height: 1.5; color: #4b5563;">
                  This OTP is valid for 10 minutes.
                </p>
                <p style="margin: 0; line-height: 1.5; color: #4b5563;">
                  If you did not request this, please ignore this email.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 14px 24px; background: #f9fafb; border-top: 1px solid #e5e7eb; color: #6b7280; font-size: 12px;">
                {{appName}} · {{year}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
